services:
  postgres:
    image: postgres:16-alpine
    container_name: hr-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: hr
      POSTGRES_PASSWORD: hr
      POSTGRES_DB: hr_auth
    ports:
      - "5432:5432"
    volumes:
      - hr_postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hr -d hr_auth"]
      interval: 10s
      timeout: 5s
      retries: 6

volumes:
  hr_postgres_data:
