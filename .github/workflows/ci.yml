name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend Build and Test
    runs-on: ubuntu-latest
    timeout-minutes: 50
    env:
      JWT_SECRET: ${{ secrets.JWT_SECRET != '' && secrets.JWT_SECRET || 'VEVTVF9TRUNSRVRfVEVTVF9TRUNSRVRfVEVTVF9TRUNSRVRfVEVTVF9TRUNSRVRfVEVTVF9TRUNSRVQxMjM0NQ==' }}
      BOOTSTRAP_ADMIN_PASSWORD: ${{ secrets.BOOTSTRAP_ADMIN_PASSWORD != '' && secrets.BOOTSTRAP_ADMIN_PASSWORD || 'ci-admin-password-123' }}
      MAIL_USERNAME: ${{ secrets.MAIL_USERNAME != '' && secrets.MAIL_USERNAME || 'ci@example.com' }}
      MAIL_PASSWORD: ${{ secrets.MAIL_PASSWORD != '' && secrets.MAIL_PASSWORD || 'ci-mail-password-123' }}
      AUTH_DB_PASSWORD: ${{ secrets.AUTH_DB_PASSWORD != '' && secrets.AUTH_DB_PASSWORD || 'ci-db-password-123' }}
      USER_DB_PASSWORD: ${{ secrets.USER_DB_PASSWORD != '' && secrets.USER_DB_PASSWORD || 'ci-db-password-123' }}
      CONTRACT_DB_PASSWORD: ${{ secrets.CONTRACT_DB_PASSWORD != '' && secrets.CONTRACT_DB_PASSWORD || 'ci-db-password-123' }}
      REQUEST_DB_PASSWORD: ${{ secrets.REQUEST_DB_PASSWORD != '' && secrets.REQUEST_DB_PASSWORD || 'ci-db-password-123' }}
      NOTIFICATION_DB_PASSWORD: ${{ secrets.NOTIFICATION_DB_PASSWORD != '' && secrets.NOTIFICATION_DB_PASSWORD || 'ci-db-password-123' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 11
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "11"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "7.4"

      - name: Assemble
        run: gradle --no-daemon --stacktrace clean assemble

      - name: Run Quality Checks and Tests
        run: gradle --no-daemon --stacktrace check

      - name: Upload Backend Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-reports
          path: |
            **/build/reports/**
            **/build/test-results/**
          if-no-files-found: ignore

  frontend:
    name: Frontend Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Dependencies
        run: npm install

      - name: Build Frontend
        run: npm run build

      - name: Upload Frontend Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist
          if-no-files-found: error
